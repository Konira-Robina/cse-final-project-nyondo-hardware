{% extends 'base.html' %}
{% block title %}Delete Supplier{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <i class="fa-solid fa-trash me-2"></i> Confirm Delete
            </div>
            <div class="card-body text-center py-4">
                <i class="fa-solid fa-truck fa-3x text-danger mb-3"></i>
                <h5>Delete <strong>{{ supplier.name }}</strong>?</h5>
                <p class="text-muted">
                    All delivery records linked to this supplier will also be removed.
                    This cannot be undone.
                </p>
                <div class="d-flex justify-content-center gap-3 mt-4">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="fa-solid fa-trash me-2"></i> Yes, Delete
                        </button>
                    </form>
                    <a href="{% url 'supplier_detail' supplier.pk %}"
                       class="btn btn-outline-secondary px-4">
                        Cancel
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
